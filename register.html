<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register Wholeseller</title>
<link rel="stylesheet" href="register.css">
</head>
<body>

<div class="form-box">

<h2>Register New Wholeseller</h2>

<form id="wholesellerForm">

<input type="text" id="wid" placeholder="Wholeseller ID (WS004)" required>

<input type="text" id="name" placeholder="Wholeseller Name" required>

<input type="text" id="location" placeholder="Location" required>

<button type="submit">Register</button>

</form>

</div>

<script src="register.js"></script>
</body>
</html>
