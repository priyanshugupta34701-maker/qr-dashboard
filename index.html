<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wholesaler Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header class="navbar">

    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search wholesalers by name or ID...">
    </div>

    <div class="center-logo">
        <img src="logo.jpeg" alt="Logo" class="logo">
    </div>

    <div class="admin-section">
        <span>Admin User</span>
        <i class="fa-solid fa-user-circle"></i>
    </div>

</header>

<section class="hero">
    <div>
        <h1>Wholesaler Directory</h1>
        <p>Manage and verify registered distribution partners across the national network.</p>
    </div>

    <button class="register-btn" onclick="window.location.href='register.html'">+ Register New Wholesaler</button>
</section>

  <p id="noResult" style="display:none; text-align:center; font-size:18px; margin-top:20px;">
  No Results Found
</p
<section class="cards-container" id="cardsContainer">
</section>

<footer class="stats-bar">
    <div>Total Partners <strong>1,284</strong></div>
    <div>Active QR Codes <strong>99.8%</strong></div>
    <div>New This Month <strong>+24</strong></div>
</footer>


</body>
<script src="script.js"></script>
</html>
